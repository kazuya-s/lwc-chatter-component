<template>
    <lightning-card title="Chatter" icon-name="standard:feed">
        <div class="slds-card__body slds-card__body_inner">

            <!-- ローディング状態 -->
            <template lwc:if={isLoading}>
                <div class="loading-container">
                    <lightning-spinner alternative-text="読み込み中..." size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- エラー状態 -->
            <template lwc:elseif={hasError}>
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">エラー</span>
                    <lightning-icon
                        icon-name="utility:error"
                        alternative-text="エラー"
                        size="x-small"
                        class="slds-m-right_x-small"
                    ></lightning-icon>
                    <p>{errorMessage}</p>
                </div>
            </template>

            <!-- フィード一覧 -->
            <template lwc:elseif={hasFeedItems}>
                <ul class="feed-list slds-has-dividers_around-space">
                    <template for:each={feedItems} for:item="item">
                        <li key={item.id} class="feed-item slds-item">
                            <article class="slds-post">
                                <!-- 投稿者ヘッダー -->
                                <header class="slds-post__header slds-media">
                                    <div class="slds-media__figure">
                                        <template lwc:if={item.actorPhotoUrl}>
                                            <img
                                                src={item.actorPhotoUrl}
                                                alt={item.actorName}
                                                class="actor-photo"
                                            />
                                        </template>
                                        <template lwc:else>
                                            <lightning-icon
                                                icon-name="standard:user"
                                                size="medium"
                                                alternative-text={item.actorName}
                                            ></lightning-icon>
                                        </template>
                                    </div>
                                    <div class="slds-media__body">
                                        <div class="slds-grid slds-grid_align-spread slds-has-flexi-truncate">
                                            <p class="slds-text-heading_small">
                                                <span class="actor-name">{item.actorName}</span>
                                            </p>
                                        </div>
                                        <p class="slds-text-body_small slds-text-color_weak">
                                            <lightning-formatted-date-time
                                                value={item.createdDate}
                                                year="numeric"
                                                month="short"
                                                day="numeric"
                                                hour="2-digit"
                                                minute="2-digit"
                                            ></lightning-formatted-date-time>
                                        </p>
                                    </div>
                                </header>

                                <!-- 本文（全文表示・折りたたみなし） -->
                                <div class="slds-post__content feed-body">
                                    <lightning-formatted-rich-text value={item.body}></lightning-formatted-rich-text>
                                </div>

                                <!-- フッター（コメント数・いいね数） -->
                                <footer class="slds-post__footer">
                                    <ul class="slds-post__footer-actions">
                                        <li class="slds-post__footer-action">
                                            <button
                                                class={item.likeButtonClass}
                                                onclick={handleLike}
                                                data-id={item.id}
                                                disabled={item.isLiking}
                                                aria-label="いいね"
                                                aria-pressed={item.isLiked}
                                            >
                                                <lightning-icon
                                                    icon-name="utility:like"
                                                    size="x-small"
                                                    class="slds-m-right_xx-small"
                                                    alternative-text="いいね"
                                                ></lightning-icon>
                                                <span>{item.likeCount}</span>
                                            </button>
                                        </li>
                                        <li class="slds-post__footer-action">
                                            <lightning-icon
                                                icon-name="utility:comments"
                                                size="x-small"
                                                class="slds-m-right_xx-small"
                                                alternative-text="コメント"
                                            ></lightning-icon>
                                            <span>{item.commentCount}</span>
                                        </li>
                                    </ul>
                                </footer>
                            </article>
                        </li>
                    </template>
                </ul>
            </template>

            <!-- 空状態 -->
            <template lwc:else>
                <div class="empty-state slds-align_absolute-center">
                    <div class="slds-text-align_center">
                        <lightning-icon
                            icon-name="standard:feed"
                            size="large"
                            class="slds-m-bottom_medium"
                            alternative-text="投稿なし"
                        ></lightning-icon>
                        <p class="slds-text-body_regular slds-text-color_weak">
                            Chatterの投稿がありません
                        </p>
                    </div>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
